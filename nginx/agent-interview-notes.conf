# Agent Interview Notes — Nginx Reverse Proxy
# 使用前将 agent-notes.example.com 替换为你的域名

server {
    listen 80;
    server_name agent-notes.example.com;

    # Certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 强制跳转 HTTPS（配置证书后取消注释）
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name agent-notes.example.com;

    # SSL 证书（certbot 自动生成）
    ssl_certificate     /etc/letsencrypt/live/agent-notes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent-notes.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志
    access_log /var/log/nginx/agent-notes-access.log;
    error_log  /var/log/nginx/agent-notes-error.log;

    # 上传限制
    client_max_body_size 50M;

    # 反向代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # 静态资源缓存
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }
}
