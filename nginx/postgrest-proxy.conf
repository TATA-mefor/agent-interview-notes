# Nginx proxy for PostgREST — strips Supabase client's /rest/v1/ prefix
# supabase-js sends: GET /rest/v1/cards?select=*
# PostgREST expects:  GET /cards?select=*

server {
    listen 3001;
    server_name _;

    # Maximum upload size for knowledge documents
    client_max_body_size 50M;

    location /rest/v1/ {
        # Strip /rest/v1/ prefix before forwarding to PostgREST
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://postgrest:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PostgREST returns "Content-Type: application/json; charset=utf-8"
        # but supabase-js may expect specific content-type responses
        proxy_pass_header Content-Type;
    }
}
