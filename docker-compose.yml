services:
  # Next.js Web 应用
  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"  # 0.0.0.0 — 允许局域网访问
    environment:
      # Database
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_notes}
      # Supabase (通过 nginx → PostgREST 连接本地 PG)
      - NEXT_PUBLIC_SUPABASE_URL=http://supabase-proxy:3001
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - DIFY_API_URL=${DIFY_API_URL:-}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://10.30.47.179:3000}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
      supabase-proxy:
        condition: service_started
    networks:
      - internal

  # PostgREST — Supabase-compatible REST API for local PG
  postgrest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      PGRST_DB_URI: postgresql://authenticator:authenticator_pass@postgres:5432/${POSTGRES_DB:-agent_notes}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_POOL: 10
      PGRST_SERVER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # Nginx — strips /rest/v1/ prefix so supabase-js can talk to PostgREST
  supabase-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/postgrest-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      postgrest:
        condition: service_started
    networks:
      - internal

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agent_notes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./supabase/init_roles.sql:/docker-entrypoint-initdb.d/03_roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent_notes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Ollama 本地 LLM（可选）
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    networks:
      - internal

volumes:
  postgres_data:
  ollama_data:

networks:
  internal:
    driver: bridge
